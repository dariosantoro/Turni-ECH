<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Turni ECH</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Turni ECH">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .safe-padding-top { padding-top: env(safe-area-inset-top); }
        .safe-padding-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .today-card { border: 2px solid #3b82f6 !important; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5); }
        .today-row { background-color: #eff6ff; font-weight: bold; border-left: 4px solid #3b82f6; }
        .today-cell { background-color: #eff6ff; border: 2px solid #3b82f6; border-radius: 0.5rem; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased pb-20">

    <div id="user-modal" class="fixed inset-0 bg-blue-600 z-[100] flex flex-col justify-center items-center px-6 hidden">
        <h2 class="text-3xl font-bold text-white mb-2 text-center">Benvenuto!</h2>
        <p class="text-blue-100 mb-8 text-center text-sm">Seleziona il tuo nome per personalizzare il calendario.</p>
        
        <div class="grid grid-cols-2 gap-4 w-full max-w-sm">
            <button onclick="setUser('Antonio')" class="bg-white text-blue-700 font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform text-lg">Antonio</button>
            <button onclick="setUser('Claudia')" class="bg-white text-blue-700 font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform text-lg">Claudia</button>
            <button onclick="setUser('Dario')" class="bg-white text-blue-700 font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform text-lg">Dario</button>
            <button onclick="setUser('Paolo')" class="bg-white text-blue-700 font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform text-lg">Paolo</button>
        </div>
    </div>

    <header class="bg-blue-600 text-white shadow-md sticky top-0 z-50 safe-padding-top">
        <div class="px-4 py-3 flex justify-between items-center">
            <div class="flex items-baseline gap-2">
                <h1 class="text-xl font-bold">Turni ECH</h1>
                <select id="year-selector" class="bg-blue-700 text-white border border-blue-500 rounded px-1 py-0.5 text-sm outline-none">
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="document.getElementById('user-modal').classList.remove('hidden')" id="user-greeting" class="text-xs bg-blue-700 px-2 py-1 rounded border border-blue-500">
                    👤 Nome
                </button>

                <button class="relative p-1 focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    <span class="absolute top-0 right-0 inline-block w-2.5 h-2.5 bg-red-500 border-2 border-blue-600 rounded-full"></span>
                </button>
            </div>
        </div>
        
        <div class="flex bg-blue-700 text-sm font-semibold">
            <button onclick="setView('day')" id="btn-day" class="flex-1 py-2 text-center border-b-4 border-white transition-colors">Giorno</button>
            <button onclick="setView('week')" id="btn-week" class="flex-1 py-2 text-center border-b-4 border-transparent text-blue-200 hover:text-white transition-colors">Settimana</button>
            <button onclick="setView('month')" id="btn-month" class="flex-1 py-2 text-center border-b-4 border-transparent text-blue-200 hover:text-white transition-colors">Mese</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto" id="app-content">
        </main>

    <script>
        let currentDate = new Date(2026, 3, 5); // 5 Aprile 2026 - Data simulata
        let currentView = 'day';
        let currentUser = null;

        // --- DATABASE TURNI ---
        const turniData = {
            "2026-04-03": { mattina: "Antonio / Dario (08:00-15:00)", pomeriggio: "Claudia (15:00-22:00)", sera: "Paolo (18:00-01:00)", off: "-" },
            "2026-04-04": { mattina: "Claudia / Dario (07:00-14:00)", pomeriggio: "Paolo (14:00-21:00)", sera: "Antonio (18:00-01:00)", off: "-" },
            "2026-04-05": { mattina: "Claudia (07:00-14:00)", pomeriggio: "Antonio (14:00-21:00)", sera: "Dario (18:00-01:00)", off: "Paolo" },
            "2026-04-06": { mattina: "Antonio (07:00-14:00)", pomeriggio: "Dario (14:00-21:00)", sera: "Paolo (18:00-01:00)", off: "Claudia" },
            "2026-04-07": { mattina: "Claudia (07:00-14:00)", pomeriggio: "Paolo / Antonio (14:00-21:00)", sera: "Dario (18:00-01:00)", off: "-" },
            // ... INCOLLA QUI TUTTI GLI ALTRI DATI (dal 08 Aprile fino a Settembre) ...
        };

        const contentDiv = document.getElementById('app-content');
        
        function getIsoDateString(date) {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function getDisplayDateString(date) {
            const options = { weekday: 'long', day: 'numeric', month: 'short' };
            let str = new Date(date).toLocaleDateString('it-IT', options);
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function findShiftForPerson(dateIso, personName) {
            const t = turniData[dateIso];
            if (!t) return "-";
            if (t.mattina.includes(personName)) return "MAT";
            if (t.pomeriggio.includes(personName)) return "POM";
            if (t.sera.includes(personName)) return "SER";
            if (t.off.includes(personName)) return "OFF";
            return "-";
        }

        // --- GESTIONE UTENTE ---
        function checkFirstLoad() {
            currentUser = localStorage.getItem('ech_user');
            if (!currentUser) {
                document.getElementById('user-modal').classList.remove('hidden');
            } else {
                updateUserUI();
                setView('day'); // Carica app
            }
        }

        window.setUser = function(name) {
            currentUser = name;
            localStorage.setItem('ech_user', name);
            document.getElementById('user-modal').classList.add('hidden');
            updateUserUI();
            setView(currentView); // Aggiorna la vista corrente con il nuovo utente
            window.scrollTo(0,0);
        }

        function updateUserUI() {
            document.getElementById('user-greeting').innerText = `👤 ${currentUser}`;
        }

        // --- RENDER VISTE ---

        function renderDayView() {
            let html = '';
            const todayIso = getIsoDateString(currentDate);
            const allDates = Object.keys(turniData).sort();

            allDates.forEach(dateIso => {
                const isToday = dateIso === todayIso;
                const turni = turniData[dateIso];
                const cardClass = isToday ? "today-card bg-white rounded-xl shadow-md p-4 mb-4" : "bg-white border border-gray-200 rounded-xl shadow-sm p-4 mb-4";
                const badge = isToday ? '<span class="ml-2 bg-blue-100 text-blue-800 text-xs font-bold px-2 py-0.5 rounded uppercase tracking-wider">Oggi</span>' : '';

                // Colora leggermente lo sfondo del turno dell'utente corrente
                const myShift = findShiftForPerson(dateIso, currentUser);
                const matClass = myShift === 'MAT' ? 'bg-yellow-50 font-bold border border-yellow-200 rounded' : '';
                const pomClass = myShift === 'POM' ? 'bg-orange-50 font-bold border border-orange-200 rounded' : '';
                const serClass = myShift === 'SER' ? 'bg-indigo-50 font-bold border border-indigo-200 rounded' : '';
                const offClass = myShift === 'OFF' ? 'bg-gray-100 font-bold border border-gray-300 rounded' : '';

                html += `
                <div id="day-${dateIso}" class="${cardClass}">
                    <h2 class="text-lg font-bold text-gray-800 border-b pb-2 mb-3 flex items-center justify-between">
                        <div>${getDisplayDateString(dateIso)} ${badge}</div>
                    </h2>
                    <div class="space-y-2">
                        <div class="flex items-start ${matClass} p-1">
                            <div class="bg-yellow-100 text-yellow-800 rounded p-1 text-center w-12 mr-3 font-bold text-xs">MAT</div>
                            <div class="flex-1 text-sm pt-0.5 text-gray-700">${turni.mattina}</div>
                        </div>
                        <div class="flex items-start ${pomClass} p-1">
                            <div class="bg-orange-100 text-orange-800 rounded p-1 text-center w-12 mr-3 font-bold text-xs">POM</div>
                            <div class="flex-1 text-sm pt-0.5 text-gray-700">${turni.pomeriggio}</div>
                        </div>
                        <div class="flex items-start ${serClass} p-1">
                            <div class="bg-indigo-100 text-indigo-800 rounded p-1 text-center w-12 mr-3 font-bold text-xs">SER</div>
                            <div class="flex-1 text-sm pt-0.5 text-gray-700">${turni.sera}</div>
                        </div>
                        <div class="flex items-start ${offClass} p-1">
                            <div class="bg-gray-200 text-gray-800 rounded p-1 text-center w-12 mr-3 font-bold text-xs">OFF</div>
                            <div class="flex-1 text-sm pt-0.5 text-gray-700">${turni.off}</div>
                        </div>
                    </div>
                </div>`;
            });

            contentDiv.innerHTML = html;
            setTimeout(() => {
                const todayElement = document.getElementById(`day-${todayIso}`);
                if (todayElement) todayElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        function renderWeekView() {
            const todayIso = getIsoDateString(currentDate);
            let startOfWeek = new Date(currentDate);
            let day = startOfWeek.getDay() || 7; 
            if (day !== 1) startOfWeek.setHours(-24 * (day - 1));

            let html = `
            <div class="bg-white rounded-xl shadow-md border-2 border-blue-400 overflow-hidden mb-4">
                <div class="bg-blue-50 px-4 py-2 text-sm text-blue-800 font-bold border-b border-blue-200">
                    Settimana Corrente
                </div>
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                        <tr>
                            <th class="px-2 py-3 text-center border-r">Data</th>
                            <th class="px-2 py-3 text-center ${currentUser==='Antonio'?'bg-blue-100':''}">AG</th>
                            <th class="px-2 py-3 text-center ${currentUser==='Claudia'?'bg-blue-100':''}">CS</th>
                            <th class="px-2 py-3 text-center ${currentUser==='Dario'?'bg-blue-100':''}">DS</th>
                            <th class="px-2 py-3 text-center ${currentUser==='Paolo'?'bg-blue-100':''}">PS</th>
                        </tr>
                    </thead>
                    <tbody>`;

            for (let i = 0; i < 7; i++) {
                let d = new Date(startOfWeek);
                d.setDate(d.getDate() + i);
                const isoDate = getIsoDateString(d);
                const isToday = isoDate === todayIso;
                const dayName = new Intl.DateTimeFormat('it-IT', { weekday: 'short', day: 'numeric' }).format(d);
                
                const ag = findShiftForPerson(isoDate, "Antonio");
                const cs = findShiftForPerson(isoDate, "Claudia");
                const ds = findShiftForPerson(isoDate, "Dario");
                const ps = findShiftForPerson(isoDate, "Paolo");

                const rowClass = isToday ? "today-row" : "border-b hover:bg-gray-50";
                const label = isToday ? '<br><span class="text-[10px] bg-blue-500 text-white px-1 rounded">OGGI</span>' : '';

                html += `
                    <tr class="${rowClass}">
                        <td class="px-2 py-3 text-center border-r font-medium text-gray-900 leading-tight capitalize">
                            ${dayName} ${label}
                        </td>
                        <td class="px-2 py-3 text-center ${currentUser==='Antonio'?'bg-blue-50 border-x border-blue-100':''}">${getColoredShift(ag)}</td>
                        <td class="px-2 py-3 text-center ${currentUser==='Claudia'?'bg-blue-50 border-x border-blue-100':''}">${getColoredShift(cs)}</td>
                        <td class="px-2 py-3 text-center ${currentUser==='Dario'?'bg-blue-50 border-x border-blue-100':''}">${getColoredShift(ds)}</td>
                        <td class="px-2 py-3 text-center ${currentUser==='Paolo'?'bg-blue-50 border-x border-blue-100':''}">${getColoredShift(ps)}</td>
                    </tr>`;
            }

            html += `</tbody></table></div>`;
            contentDiv.innerHTML = html;
        }

        function getColoredShift(shiftStr) {
            if (shiftStr === "MAT") return '<span class="text-yellow-600 font-bold">MAT</span>';
            if (shiftStr === "POM") return '<span class="text-orange-500 font-bold">POM</span>';
            if (shiftStr === "SER") return '<span class="text-indigo-600 font-bold">SER</span>';
            if (shiftStr === "OFF") return '<span class="text-gray-400 font-bold text-xs">OFF</span>';
            return shiftStr;
        }

        function renderMonthView() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const todayIso = getIsoDateString(currentDate);
            
            const monthName = currentDate.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
            
            // Logica Calendario
            const firstDayDate = new Date(year, month, 1);
            let startDay = firstDayDate.getDay();
            if (startDay === 0) startDay = 7; // Trasforma Domenica (0) in 7
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let html = `
            <div class="bg-white rounded-xl shadow-md p-4 border border-gray-200">
                <div class="text-center font-bold text-lg text-gray-800 mb-4 capitalize border-b pb-2">
                    Turni di ${currentUser} - ${monthName}
                </div>
                
                <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-gray-500 mb-2">
                    <div>LUN</div><div>MAR</div><div>MER</div><div>GIO</div><div>VEN</div><div>SAB</div><div>DOM</div>
                </div>
                <div class="grid grid-cols-7 gap-1">`;

            // Celle vuote prima del 1° del mese
            for (let i = 1; i < startDay; i++) {
                html += `<div class="p-2"></div>`;
            }

            // Giorni del mese
            for (let day = 1; day <= daysInMonth; day++) {
                const loopDateIso = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const shift = findShiftForPerson(loopDateIso, currentUser);
                const isToday = loopDateIso === todayIso;
                
                let dotClass = "bg-gray-100 text-gray-400"; // Default (nessun dato)
                if (shift === "MAT") dotClass = "bg-yellow-400 text-yellow-900 shadow-sm";
                if (shift === "POM") dotClass = "bg-orange-400 text-orange-900 shadow-sm";
                if (shift === "SER") dotClass = "bg-indigo-500 text-white shadow-sm";
                if (shift === "OFF") dotClass = "bg-gray-200 text-gray-600 border border-gray-300";

                const cellStyle = isToday ? "today-cell" : "bg-white border border-gray-100 rounded-lg";

                html += `
                <div class="${cellStyle} p-1 flex flex-col items-center justify-center h-14 relative">
                    <span class="text-xs font-semibold text-gray-700 ${isToday ? 'text-blue-700' : ''}">${day}</span>
                    <div class="mt-1 w-full text-[10px] font-bold rounded flex items-center justify-center py-0.5 ${dotClass}">
                        ${shift !== "-" ? shift : ""}
                    </div>
                </div>`;
            }

            html += `</div>
            
            <div class="mt-6 pt-4 border-t flex flex-wrap justify-center gap-3 text-xs font-semibold">
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-yellow-400 mr-1 shadow-sm"></span> MAT</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-orange-400 mr-1 shadow-sm"></span> POM</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-indigo-500 mr-1 shadow-sm"></span> SER</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-gray-200 border border-gray-300 mr-1"></span> OFF</div>
            </div>
            
            </div>`;
            
            contentDiv.innerHTML = html;
        }

        window.setView = function(view) {
            currentView = view;
            
            ['day', 'week', 'month'].forEach(v => {
                const btn = document.getElementById(`btn-${v}`);
                if (v === currentView) {
                    btn.classList.replace('border-transparent', 'border-white');
                    btn.classList.replace('text-blue-200', 'text-white');
                } else {
                    btn.classList.replace('border-white', 'border-transparent');
                    btn.classList.replace('text-white', 'text-blue-200');
                }
            });
            
            if (view === 'day') renderDayView();
            if (view === 'week') renderWeekView();
            if (view === 'month') renderMonthView();
        }

        // Init App
        checkFirstLoad();

    </script>
</body>
</html>
