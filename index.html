        // Imposta la data odierna simulata (5 Aprile 2026) in base al contesto
        let currentDate = new Date(2026, 3, 5); // Mese è 0-indexed (3 = Aprile)

        const contentDiv = document.getElementById('app-content');
        const dateDisplay = document.getElementById('current-date-display');

        // Formatta la data (es: "2026-04-05")
        function getIsoDateString(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Formatta la data in italiano (es: "Domenica 5 Apr")
        function getDisplayDateString(date) {
            const options = { weekday: 'long', day: 'numeric', month: 'short' };
            let str = date.toLocaleDateString('it-IT', options);
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        // Crea la card HTML per un singolo giorno
        function createDayCard(dateStr, turni, showDateHeader = false) {
            const dateObj = new Date(dateStr);
            const title = showDateHeader ? getDisplayDateString(dateObj) : "Turni di Oggi";
            const badge = showDateHeader && dateStr === getIsoDateString(currentDate) ? '<span class="ml-2 bg-blue-100 text-blue-800 text-xs font-bold px-2 py-0.5 rounded">Oggi</span>' : '';
            
            if (!turni) {
                return `
                <div class="bg-white rounded-xl shadow p-4 mb-4 border border-gray-200">
                    <h2 class="text-lg font-bold text-gray-700 border-b pb-2 mb-3">${title} ${badge}</h2>
                    <p class="text-gray-500 italic">Nessun dato disponibile per questo giorno.</p>
                </div>`;
            }

            return `
                <div class="bg-white rounded-xl shadow-md p-4 mb-4 border border-gray-100">
                    <h2 class="text-lg font-bold text-gray-800 border-b pb-2 mb-3 flex items-center">${title} ${badge}</h2>
                    <div class="space-y-3">
                        <div class="flex items-start">
                            <div class="bg-yellow-100 text-yellow-800 rounded p-2 text-center w-12 mr-3 font-bold text-xs">MAT</div>
                            <div class="flex-1 text-sm pt-1 text-gray-700">${turni.mattina}</div>
                        </div>
                        <div class="flex items-start">
                            <div class="bg-orange-100 text-orange-800 rounded p-2 text-center w-12 mr-3 font-bold text-xs">POM</div>
                            <div class="flex-1 text-sm pt-1 text-gray-700">${turni.pomeriggio}</div>
                        </div>
                        <div class="flex items-start">
                            <div class="bg-indigo-100 text-indigo-800 rounded p-2 text-center w-12 mr-3 font-bold text-xs">SER</div>
                            <div class="flex-1 text-sm pt-1 text-gray-700">${turni.sera}</div>
                        </div>
                        <div class="flex items-start">
                            <div class="bg-gray-100 text-gray-800 rounded p-2 text-center w-12 mr-3 font-bold text-xs">OFF</div>
                            <div class="flex-1 text-sm pt-1 text-gray-700 font-semibold">${turni.off}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderDay() {
            const isoDate = getIsoDateString(currentDate);
            const turni = turniData[isoDate];
            contentDiv.innerHTML = createDayCard(isoDate, turni, false);
        }

        function renderWeek() {
            let html = '';
            // Trova il lunedì della settimana corrente
            let startOfWeek = new Date(currentDate);
            let day = startOfWeek.getDay() || 7; // Converti domenica (0) in 7
            if (day !== 1) startOfWeek.setHours(-24 * (day - 1));

            for (let i = 0; i < 7; i++) {
                let d = new Date(startOfWeek);
                d.setDate(d.getDate() + i);
                const isoDate = getIsoDateString(d);
                html += createDayCard(isoDate, turniData[isoDate], true);
            }
            contentDiv.innerHTML = html;
        }

        function renderMonth() {
            // Per semplicità, in vista mese renderizziamo i prossimi 14 giorni inseriti a database
            let html = '<h3 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">Prossimi Turni</h3>';
            let d = new Date(currentDate);
            
            for (let i = 0; i < 14; i++) {
                let tempDate = new Date(d);
                tempDate.setDate(tempDate.getDate() + i);
                const isoDate = getIsoDateString(tempDate);
                if(turniData[isoDate]) {
                     html += createDayCard(isoDate, turniData[isoDate], true);
                }
            }
            contentDiv.innerHTML = html;
        }

        function updateTabs() {
            ['day', 'week', 'month'].forEach(v => {
                const btn = document.getElementById(`btn-${v}`);
                if (v === currentView) {
                    btn.classList.replace('border-transparent', 'border-white');
                    btn.classList.replace('text-blue-200', 'text-white');
                } else {
                    btn.classList.replace('border-white', 'border-transparent');
                    btn.classList.replace('text-white', 'text-blue-200');
                }
            });
        }

        window.setView = function(view) {
            currentView = view;
            updateTabs();
            
            if (view === 'day') renderDay();
            if (view === 'week') renderWeek();
            if (view === 'month') renderMonth();
            
            window.scrollTo(0,0);
        }

        // Init
        dateDisplay.innerText = getDisplayDateString(currentDate);
        setView('day');
