        .today-card { border: 2px solid #3b82f6 !important; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5); }

</head>

        </div>
    </div>

                    <option value="2027">2027</option>
                </select>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="document.getElementById('user-modal').classList.remove('hidden')" id="user-greeting" class="text-xs bg-blue-700 px-2 py-1.5 rounded border border-blue-500 font-medium whitespace-nowrap">
                    👤 Nome
                </button>
                <button class="relative p-1 focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    <span class="absolute top-0 right-0 inline-block w-2.5 h-2.5 bg-red-500 border-2 border-blue-600 rounded-full"></span>
                </button>
            </div>
        </div>
        
        <div class="flex bg-blue-700 text-sm font-semibold">
            <button onclick="setView('day')" id="btn-day" class="flex-1 tab-btn text-center border-b-4 border-white transition-colors">Giorno</button>
            <button onclick="setView('week')" id="btn-week" class="flex-1 tab-btn text-center border-b-4 border-transparent text-blue-200 hover:text-white transition-colors">Settimana</button>
            <button onclick="setView('month')" id="btn-month" class="flex-1 tab-btn text-center border-b-4 border-transparent text-blue-200 hover:text-white transition-colors">Mese</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto" id="app-content">
        </main>

        const contentDiv = document.getElementById('app-content');
        
        function getIsoDateString(date) {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function getDisplayDateString(date) {
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            let str = new Date(date).toLocaleDateString('it-IT', options);
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function findShiftForPerson(dateIso, personName) {
            const t = turniData[dateIso];
            if (!t) return "-";
            if (t.mattina.includes(personName)) return "MAT";
            if (t.pomeriggio.includes(personName)) return "POM";
            if (t.sera.includes(personName)) return "SER";
            if (t.off.includes(personName)) return "OFF";
            return "-";
        }

        function getColoredShift(shiftStr) {
            if (shiftStr === "MAT") return '<span class="text-yellow-600 font-bold">MAT</span>';
            if (shiftStr === "POM") return '<span class="text-orange-500 font-bold">POM</span>';
            if (shiftStr === "SER") return '<span class="text-indigo-600 font-bold">SER</span>';
            if (shiftStr === "OFF") return '<span class="text-gray-400 font-bold text-xs">OFF</span>';
            return shiftStr;
        }

            } else {
                updateUserUI();
                setView('day'); 
            }

            localStorage.setItem('ech_user', name);
            document.getElementById('user-modal').classList.add('hidden');
            updateUserUI();

            window.scrollTo(0,0);

        // --- RENDER VISTE ---
        function renderDayView() {
            let html = '';
            const todayIso = getIsoDateString(currentDate);
            const allDates = Object.keys(turniData).sort();

            if (allDates.length === 0) {
                contentDiv.innerHTML = '<p class="text-center mt-10">Nessun turno disponibile nel database.</p>';
                return;
            }

            allDates.forEach(dateIso => {
                const isToday = dateIso === todayIso;
                const turni = turniData[dateIso];
                const cardClass = isToday ? "today-card bg-white rounded-xl shadow-md p-4 mb-4" : "bg-white border border-gray-200 rounded-xl shadow-sm p-4 mb-4";
                const badge = isToday ? '<span class="ml-2 bg-blue-100 text-blue-800 text-xs font-bold px-2 py-0.5 rounded uppercase tracking-wider">Oggi</span>' : '';

                const myShift = findShiftForPerson(dateIso, currentUser);
                const matClass = myShift === 'MAT' ? 'bg-yellow-50 font-bold border border-yellow-200 rounded' : '';
                const pomClass = myShift === 'POM' ? 'bg-orange-50 font-bold border border-orange-200 rounded' : '';
                const serClass = myShift === 'SER' ? 'bg-indigo-50 font-bold border border-indigo-200 rounded' : '';
                const offClass = myShift === 'OFF' ? 'bg-gray-100 font-bold border border-gray-300 rounded' : '';

                html += `
                <div id="day-${dateIso}" class="${cardClass}">
                    <h2 class="text-lg font-bold text-gray-800 border-b pb-2 mb-3 flex items-center justify-between">
                        <div class="capitalize">${getDisplayDateString(dateIso)}</div>

                        <div class="flex items-start ${matClass} p-1">

        function renderWeekView() {
            const allDatesStr = Object.keys(turniData).sort();
            if (allDatesStr.length === 0) return;

            const todayIso = getIsoDateString(currentDate);
            const firstDate = new Date(allDatesStr[0]);
            const lastDate = new Date(allDatesStr[allDatesStr.length - 1]);

            // Trova il lunedì della prima settimana
            let currentMonday = new Date(firstDate);
            let firstDayIndex = currentMonday.getDay() || 7;
            currentMonday.setDate(currentMonday.getDate() - (firstDayIndex - 1));

            let html = '';

            // Genera tutte le settimane fino alla data finale
            while (currentMonday <= lastDate) {
                const titleStr = currentMonday.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
                
                html += `
                <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden mb-6">
                    <div class="bg-gray-100 px-4 py-2 text-sm text-gray-700 font-bold border-b border-gray-200">
                        Settimana del ${titleStr}
                    </div>
                    <table class="w-full text-sm text-left">
                        <thead class="text-xs text-gray-500 uppercase bg-white border-b">
                            <tr>
                                <th class="px-2 py-3 text-center border-r">Data</th>
                                <th class="px-2 py-3 text-center ${currentUser==='Antonio'?'bg-blue-50 text-blue-700':''}">AG</th>
                                <th class="px-2 py-3 text-center ${currentUser==='Claudia'?'bg-blue-50 text-blue-700':''}">CS</th>
                                <th class="px-2 py-3 text-center ${currentUser==='Dario'?'bg-blue-50 text-blue-700':''}">DS</th>
                                <th class="px-2 py-3 text-center ${currentUser==='Paolo'?'bg-blue-50 text-blue-700':''}">PS</th>
                            </tr>
                        </thead>
                        <tbody>`;

                for (let i = 0; i < 7; i++) {
                    let d = new Date(currentMonday);
                    d.setDate(d.getDate() + i);
                    const isoDate = getIsoDateString(d);
                    const isToday = isoDate === todayIso;
                    const dayName = new Intl.DateTimeFormat('it-IT', { weekday: 'short', day: 'numeric' }).format(d);
                    
                    const ag = findShiftForPerson(isoDate, "Antonio");
                    const cs = findShiftForPerson(isoDate, "Claudia");
                    const ds = findShiftForPerson(isoDate, "Dario");
                    const ps = findShiftForPerson(isoDate, "Paolo");

                    const rowClass = isToday ? "today-row" : "border-b hover:bg-gray-50";
                    const label = isToday ? '<br><span class="text-[10px] bg-blue-500 text-white px-1.5 py-0.5 rounded shadow-sm">OGGI</span>' : '';

                    html += `
                        <tr id="weekday-${isoDate}" class="${rowClass}">
                            <td class="px-2 py-3 text-center border-r font-medium text-gray-900 leading-tight capitalize">
                                ${dayName} ${label}
                            </td>
                            <td class="px-2 py-3 text-center ${currentUser==='Antonio'?'bg-blue-50/50 border-x border-blue-100':''}">${getColoredShift(ag)}</td>
                            <td class="px-2 py-3 text-center ${currentUser==='Claudia'?'bg-blue-50/50 border-x border-blue-100':''}">${getColoredShift(cs)}</td>
                            <td class="px-2 py-3 text-center ${currentUser==='Dario'?'bg-blue-50/50 border-x border-blue-100':''}">${getColoredShift(ds)}</td>
                            <td class="px-2 py-3 text-center ${currentUser==='Paolo'?'bg-blue-50/50 border-x border-blue-100':''}">${getColoredShift(ps)}</td>
                        </tr>`;
                }

                html += `</tbody></table></div>`;
                currentMonday.setDate(currentMonday.getDate() + 7); // Vai alla settimana successiva
            }
            contentDiv.innerHTML = html;

            // Scroll alla settimana corrente se "Oggi" è nei dati
            setTimeout(() => {
                const todayElement = document.getElementById(`weekday-${todayIso}`);
                if (todayElement) todayElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

            let loopMonth = new Date(firstDate.getFullYear(), firstDate.getMonth(), 1);
            let endMonth = new Date(lastDate.getFullYear(), lastDate.getMonth(), 1);

            let html = '';

            while (loopMonth <= endMonth) {
                const year = loopMonth.getFullYear();
                const month = loopMonth.getMonth();
                const monthName = loopMonth.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
                
                let startDay = loopMonth.getDay();
                if (startDay === 0) startDay = 7;
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                html += `
                <div id="monthbox-${year}-${month}" class="bg-white rounded-xl shadow-md p-4 border border-gray-200 mb-6">
                    <div class="text-center font-bold text-lg text-gray-800 mb-4 capitalize border-b pb-2">
                        ${monthName}
                    </div>
                    
                    <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-gray-400 mb-2">
                        <div>LUN</div><div>MAR</div><div>MER</div><div>GIO</div><div>VEN</div><div>SAB</div><div>DOM</div>
                    </div>
                    <div class="grid grid-cols-7 gap-1">`;

                for (let i = 1; i < startDay; i++) {
                    html += `<div class="p-2"></div>`;
                }

                for (let day = 1; day <= daysInMonth; day++) {
                    const loopDateIso = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const shift = findShiftForPerson(loopDateIso, currentUser);
                    const isToday = loopDateIso === todayIso;
                    
                    let dotClass = "bg-gray-50 text-transparent"; 
                    if (shift === "MAT") dotClass = "bg-yellow-400 text-yellow-900 shadow-sm";
                    if (shift === "POM") dotClass = "bg-orange-400 text-orange-900 shadow-sm";
                    if (shift === "SER") dotClass = "bg-indigo-500 text-white shadow-sm";
                    if (shift === "OFF") dotClass = "bg-gray-200 text-gray-600 border border-gray-300";

                    const cellStyle = isToday ? "today-cell" : "bg-white border border-gray-100 rounded-lg";

                    html += `
                    <div class="${cellStyle} p-1 flex flex-col items-center justify-center h-14 relative">
                        <span class="text-xs font-semibold text-gray-700 ${isToday ? 'text-blue-700' : ''}">${day}</span>
                        <div class="mt-1 w-full text-[10px] font-bold rounded flex items-center justify-center py-0.5 ${dotClass}">
                            ${shift !== "-" ? shift : ""}
                        </div>
                    </div>`;
                }

                html += `</div></div>`;
                loopMonth.setMonth(loopMonth.getMonth() + 1); // Vai al mese successivo
            }
            
            // Legenda globale fissa in basso
            html += `
            <div class="pt-2 pb-6 flex flex-wrap justify-center gap-3 text-xs font-semibold text-gray-600">
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-yellow-400 mr-1 shadow-sm"></span> MAT</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-orange-400 mr-1 shadow-sm"></span> POM</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-indigo-500 mr-1 shadow-sm"></span> SER</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-gray-200 border border-gray-300 mr-1"></span> OFF</div>
            </div>`;

            contentDiv.innerHTML = html;

            // Scroll al mese corrente se presente
            setTimeout(() => {
                const currentMonthBox = document.getElementById(`monthbox-${currentDate.getFullYear()}-${currentDate.getMonth()}`);
                if (currentMonthBox) currentMonthBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        // --- GESTIONE SCROLL "TORNA A OGGI" ---
        window.scrollToToday = function() {
            const todayIso = getIsoDateString(currentDate);
            let targetId = null;
            
            if(currentView === 'day') targetId = `day-${todayIso}`;
            if(currentView === 'week') targetId = `weekday-${todayIso}`;
            if(currentView === 'month') targetId = `monthbox-${currentDate.getFullYear()}-${currentDate.getMonth()}`;

            if(targetId) {
                const el = document.getElementById(targetId);
                if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('btn-back-today');
            const todayIso = getIsoDateString(currentDate);
            const todayElement = document.getElementById(currentView === 'day' ? `day-${todayIso}` : null); // Per ora limitiamo il tasto solo alla vista Giorno
            
            if (currentView !== 'day' || !todayElement) {
                btn.classList.add('hidden');
                return;
            }

            const rect = todayElement.getBoundingClientRect();
            // Mostra il pulsante se "Oggi" è sopra o sotto lo schermo visibile
            if (rect.bottom < 0 || rect.top > window.innerHeight) {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        });

        // --- NAVIGATION ---
        window.setView = function(view) {
            currentView = view;
            
            ['day', 'week', 'month'].forEach(v => {
                const btn = document.getElementById(`btn-${v}`);
                if (v === currentView) {
                    btn.classList.replace('border-transparent', 'border-white');
                    btn.classList.replace('text-blue-200', 'text-white');
                } else {
                    btn.classList.replace('border-white', 'border-transparent');
                    btn.classList.replace('text-white', 'text-blue-200');
                }
            });
            
            if (view === 'day') renderDayView();
            if (view === 'week') renderWeekView();
            if (view === 'month') renderMonthView();
        }

        // Init App
        checkFirstLoad();

    </script>
</body>
</html>
